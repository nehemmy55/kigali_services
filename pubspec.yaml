name: kigali_services
description: "Kigali City Services & Places Directory - Discover essential services and places in Kigali."

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.0

  # State Management
  provider: ^6.1.2

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.15.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

